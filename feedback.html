<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customer Feedback Form</title>

  <!-- INTERNAL CSS -->
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #fff;
      padding: 25px;
      border-radius: 10px;
      width: 350px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input, textarea, select, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      background: #007BFF;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .error {
      color: red;
      font-size: 12px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Feedback Form</h2>

    <form id="feedbackForm">
      <input type="text" id="name" placeholder="Your Name">
      <div class="error" id="nameError"></div>

      <input type="email" id="email" placeholder="Your Email">
      <div class="error" id="emailError"></div>

      <select id="rating">
        <option value="">Rate Us</option>
        <option value="5">Excellent</option>
        <option value="4">Very Good</option>
        <option value="3">Good</option>
        <option value="2">Fair</option>
        <option value="1">Poor</option>
      </select>
      <div class="error" id="ratingError"></div>

      <textarea id="message" rows="4" placeholder="Your Feedback"></textarea>
      <div class="error" id="messageError"></div>

      <button type="submit">Submit</button>
    </form>
  </div>

  <!-- INTERNAL JS -->
  <script>
    document.getElementById("feedbackForm").addEventListener("submit", function(e) {
      e.preventDefault();

      // Get values
      let name = document.getElementById("name").value.trim();
      let email = document.getElementById("email").value.trim();
      let rating = document.getElementById("rating").value;
      let message = document.getElementById("message").value.trim();

      // Clear errors
      document.getElementById("nameError").innerText = "";
      document.getElementById("emailError").innerText = "";
      document.getElementById("ratingError").innerText = "";
      document.getElementById("messageError").innerText = "";

      let isValid = true;

      // Validation
      if (name === "") {
        document.getElementById("nameError").innerText = "Name is required";
        isValid = false;
      }

      if (email === "") {
        document.getElementById("emailError").innerText = "Email is required";
        isValid = false;
      }

      if (rating === "") {
        document.getElementById("ratingError").innerText = "Please select a rating";
        isValid = false;
      }

      if (message === "") {
        document.getElementById("messageError").innerText = "Feedback is required";
        isValid = false;
      }

      // If valid
      if (isValid) {
        alert("Thank you for your feedback, " + name + "!");
        document.getElementById("feedbackForm").reset();
      }
    });
  </script>

</body>
</html>
